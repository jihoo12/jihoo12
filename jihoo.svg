<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 435 50' width='435px' height='50px'>
  <defs>
    <linearGradient id='grad1' x1='0%' y1='0%' x2='100%' y2='0%'>
      <stop offset='0%' stop-color='#ea76cb' />
      <stop offset='100%' stop-color='#6e8efb' />
    </linearGradient>
  </defs>
  <text font-family='monospace' font-weight='bold' fill='url(#grad1)' font-size='22' x='0' y='32' style='letter-spacing: 1px;'>
    Hello, I'm Jihoo
    <animate attributeName='x' from='-30' to='0' dur='1.2s' calcMode='spline' keySplines='0.1, 0.9, 0.2, 1' fill='freeze' />
    <animate attributeName='opacity' from='0' to='1' dur='1.2s' fill='freeze' />
  </text>
</svg>
