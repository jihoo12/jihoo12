
<svg width="450" height="240" viewBox="0 0 450 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 700 22px 'Segoe UI', Ubuntu, Sans-Serif; fill: #1e66f5; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #6c6f85; }
    .value { font: 700 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #4c4f69; }
    .level-badge { font: 800 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ea76cb; filter: drop-shadow(0 0 2px #ea76cb); }
    .small { font: 400 10px 'Segoe UI', Ubuntu, Sans-Serif; fill: #9ca0b0; }
    .bar-bg { fill: #ccd0da; }
    .bar-fill { fill: url(#grad); }
  </style>
  
  <defs>
    <!-- Background Gradient (Base to Mantle) -->
    <linearGradient id="rectGrad" x1="0" y1="0" x2="450" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eff1f5"/>
      <stop offset="1" stop-color="#e6e9ef"/>
    </linearGradient>
    <!-- Progress Bar Gradient (Sapphire to Blue) -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#209fb5"/>
      <stop offset="100%" stop-color="#1e66f5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="450" height="240" rx="15" fill="url(#rectGrad)" stroke="#bcc0cc" stroke-width="2"/>
  
  <!-- Header & Level -->
  <text x="30" y="45" class="header">🚀 Dev Rank</text>
  <text x="330" y="55" class="level-badge">Lv 11</text>
  
  <!-- Stats Grid -->
  <g transform="translate(30, 80)">
    <text y="0" class="stat">Commits</text>
    <text x="100" y="0" class="value">1121</text>
    
    <text y="30" class="stat">PRs</text>
    <text x="100" y="30" class="value">30</text>
    
    <text y="60" class="stat">Reviews</text>
    <text x="100" y="60" class="value">0</text>

    <text x="200" y="0" class="stat">Issues</text>
    <text x="280" y="0" class="value">1</text>

    <text x="200" y="30" class="stat">Stars</text>
    <text x="280" y="30" class="value">18</text>
    
    <text x="200" y="60" class="stat">Total XP</text>
    <text x="280" y="60" class="value">1308</text>
  </g>

  <!-- Progress Bar -->
  <text x="30" y="180" class="stat">Progress to Lvl 12</text>
  <rect x="25" y="190" width="400" height="12" rx="6" class="bar-bg"/>
  <rect x="25" y="190" width="170" height="12" rx="6" class="bar-fill"/>
  
  <text x="30" y="225" class="small">Updated 2026-05-09 07:17 UTC</text>
</svg>
