
<svg width="450" height="240" viewBox="0 0 450 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 700 22px 'Segoe UI', Ubuntu, Sans-Serif; fill: #89b4fa; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #a6adc8; }
    .value { font: 700 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #cdd6f4; }
    .level-badge { font: 800 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #f5c2e7; filter: drop-shadow(0 0 4px #f5c2e7); }
    .small { font: 400 10px 'Segoe UI', Ubuntu, Sans-Serif; fill: #585b70; }
    .bar-bg { fill: #313244; }
    .bar-fill { fill: url(#grad); }
  </style>
  
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="rectGrad" x1="0" y1="0" x2="450" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#181825"/>
    </linearGradient>
    <!-- Progress Bar Gradient (Sapphire to Blue) -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="100%" stop-color="#89b4fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="450" height="240" rx="15" fill="url(#rectGrad)" stroke="#45475a" stroke-width="2"/>
  
  <!-- Header & Level -->
  <text x="30" y="45" class="header">🚀 Dev Rank</text>
  <text x="330" y="55" class="level-badge">Lv 11</text>
  
  <!-- Stats Grid -->
  <g transform="translate(30, 80)">
    <text y="0" class="stat">Commits</text>
    <text x="100" y="0" class="value">1072</text>
    
    <text y="30" class="stat">PRs</text>
    <text x="100" y="30" class="value">20</text>
    
    <text y="60" class="stat">Reviews</text>
    <text x="100" y="60" class="value">0</text>

    <text x="200" y="0" class="stat">Issues</text>
    <text x="280" y="0" class="value">1</text>

    <text x="200" y="30" class="stat">Stars</text>
    <text x="280" y="30" class="value">23</text>
    
    <text x="200" y="60" class="stat">Total XP</text>
    <text x="280" y="60" class="value">1219</text>
  </g>

  <!-- Progress Bar -->
  <text x="30" y="180" class="stat">Progress to Lvl 12</text>
  <rect x="25" y="190" width="400" height="12" rx="6" class="bar-bg"/>
  <rect x="25" y="190" width="15" height="12" rx="6" class="bar-fill"/>
  
  <text x="30" y="225" class="small">Updated 2026-05-07 09:43 UTC</text>
</svg>
