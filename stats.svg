
<svg width="450" height="240" viewBox="0 0 450 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .header { font: 700 22px 'Segoe UI', Ubuntu, Sans-Serif; fill: #58a6ff; }
    .stat { font: 600 14px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
    .value { font: 700 16px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }
    .level-badge { font: 800 28px 'Segoe UI', Ubuntu, Sans-Serif; fill: #ffffff; filter: drop-shadow(0 0 5px #58a6ff); }
    .small { font: 400 10px 'Segoe UI', Ubuntu, Sans-Serif; fill: #484f58; }
    .bar-bg { fill: #21262d; }
    .bar-fill { fill: url(#grad); filter: drop-shadow(0 0 3px #58a6ff); }
  </style>
  
  <defs>
    <linearGradient id="rectGrad" x1="0" y1="0" x2="450" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="450" height="240" rx="15" fill="url(#rectGrad)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Header & Level -->
  <text x="30" y="45" class="header">🚀 Dev Rank</text>
  <text x="350" y="55" class="level-badge">Lv 11</text>
  
  <!-- Stats Grid -->
  <g transform="translate(30, 80)">
    <text y="0" class="stat">Commits</text>
    <text x="100" y="0" class="value">1071</text>
    
    <text y="30" class="stat">PRs</text>
    <text x="100" y="30" class="value">20</text>
    
    <text y="60" class="stat">Reviews</text>
    <text x="100" y="60" class="value">0</text>

    <text x="200" y="0" class="stat">Issues</text>
    <text x="280" y="0" class="value">1</text>

    <text x="200" y="30" class="stat">Stars</text>
    <text x="280" y="30" class="value">23</text>
    
    <text x="200" y="60" class="stat">Total XP</text>
    <text x="280" y="60" class="value">1218</text>
  </g>

  <!-- Progress Bar -->
  <text x="30" y="180" class="stat">Progress to Lvl 12</text>
  <rect x="25" y="190" width="400" height="12" rx="6" class="bar-bg"/>
  <rect x="25" y="190" width="13" height="12" rx="6" class="bar-fill"/>
  
  <text x="30" y="225" class="small">Updated 2026-05-07 09:40 UTC</text>
</svg>
