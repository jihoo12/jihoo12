name: Update Tamagotchi

on:
  schedule:
    # Runs every 3 hours. Adjust as you like — even once a day is plenty
    # since the underlying data (daily contributions) doesn't change fast.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]      # optional: re-render right after you push a commit

permissions:
  contents: write

jobs:
  update-pet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate pet SVG
        env:
          GITHUB_LOGIN: ${{ github.repository_owner }}
          # PAT_TOKEN is a Personal Access Token you add as a repo secret.
          # The default GITHUB_TOKEN also works for reading public contribution
          # data, but a PAT is more reliable for the GraphQL contributionsCollection
          # field on some account/privacy settings. See README for setup.
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PET_OUTPUT_PATH: pet.svg
        run: node scripts/index.js

      - name: Commit updated pet
        run: |
          git config user.name "tamagotchi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add pet.svg
          git diff --quiet --cached || git commit -m "chore: update tamagotchi pet [skip ci]"
          git push
