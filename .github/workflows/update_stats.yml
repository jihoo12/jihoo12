name: Update GitHub Stats & Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Ensure the bot can push to your repo
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Note: v4 is the current stable version

      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python main.py

      # --- NEW: Generate Snake Step ---
      - name: Generate snake animation
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-snake.svg
        # Note: I removed "dist/" so it saves directly to your root folder

      # --- Updated Commit Step ---
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add both the stats and the snake
          git add stats.svg github-snake.svg
          
          git commit -m "Update GitHub assets (Stats & Snake)" || echo "No changes to commit"
          git push