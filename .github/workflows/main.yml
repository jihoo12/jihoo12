name: Update GitHub Language Stats

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시(UTC 00:00) 자동 실행
  workflow_dispatch:     # GitHub Actions 탭에서 수동 실행 버튼 활성화

jobs:
  update-stats:
    runs-on: ubuntu-latest
    # 쓰기 권한 명시 (rejected 에러 방지)
    permissions:
      contents: write

    steps:
      # 1. 저장소 코드를 체크아웃 (전체 히스토리 포함)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 라이브러리 설치
      - name: Install dependencies
        run: pip install requests

      # 4. 배지 생성 스크립트 실행
      - name: Generate Language Stats SVG
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: python update_stats.py

      # 5. 변경사항 커밋 및 강제 푸시 (충돌 완전 해결)
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일 추가
          git add stats.svg
          
          # 변경사항이 있을 때만 푸시
          if git diff --staged --quiet; then
            echo "No 실질적인 데이터 변화가 없어 업데이트를 건너뜁니다."
          else
            git commit -m "📊 자동 업데이트: Language Stats SVG"
            # --force 옵션으로 충돌 없이 강제 업데이트
            git push origin main --force
          fi
